<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e53935">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>My Digital Songbook</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <div class="songbook-container">
        <aside class="sidebar">
            <h2>Mirandas Songbook</h2>
            <button id="theme-toggle-btn" class="theme-toggle-button" type="button" aria-label="Toggle dark mode" aria-pressed="false" title="Toggle dark mode">
                <span class="theme-toggle-knob"></span>
            </button>
            <input type="text" id="search-bar" placeholder="Search songs...">
            <ul id="table-of-contents">
                <!-- Song list will be generated here by JavaScript -->
            </ul>
            <h2 class="setlist-heading">Setlist</h2>
            <ul id="setlist-contents">
                <!-- Setlist items will be generated here by JavaScript -->
            </ul>
            <button id="add-song-btn" class="add-song-button">Add New Song</button>
            <button id="import-songs-btn" class="import-songs-button">Import Songs</button>
            <button id="export-songs-btn" class="export-songs-button">Export My Songs</button>
            <button id="open-ocr-btn" class="ocr-tool-button">OCR Tool</button>
            <input type="file" id="song-file-input" accept=".json" style="display: none;">
        </aside>

        <main id="song-display" class="song-display">
            <!-- Selected song will be displayed here -->
            <div class="placeholder">
                <h2>Welcome to Your Songbook!</h2>
                <p>Select a song from the list to get started.</p>
            </div>
        </main>
    </div>

    <div id="add-song-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span id="close-modal-btn" class="close-button">&times;</span>
            <h2 id="modal-title">Add a New Song</h2>
            <form id="song-form">
                <input type="hidden" id="song-id" name="id">
                <label for="song-title">Title:</label>
                <input type="text" id="song-title" name="title" required>

                <label for="song-artist">Artist:</label>
                <select id="song-artist" name="artist" required>
                    <option value="">--Please choose an option--</option>
                    <option value="Miranda Smart">Miranda Smart</option>
                    <option value="CLAW MACHINE">CLAW MACHINE</option>
                    <option value="Appalachian Rejects">Appalachian Rejects</option>
                    <option value="Cover">Cover</option>
                </select>

                <div id="cover-artist-container" style="display: none;">
                    <label for="cover-artist-name">Artist Name:</label>
                    <input type="text" id="cover-artist-name" name="coverArtistName">
                </div>
                <label for="song-audio">Audio File Path (e.g., audio/song.mp3):</label>
                <input type="text" id="song-audio" name="audioFile">

                <label for="song-tuning">Tuning (e.g., Standard, DADGAD):</label>
                <input type="text" id="song-tuning" name="tuning">

                <label for="song-capo">Capo Fret (e.g., 2):</label>
                <input type="number" id="song-capo" name="capo" min="0" step="1">

                <label for="song-lyrics">Lyrics and Chords:</label>
                <textarea id="song-lyrics" name="lyrics" rows="10" required placeholder="Enter chords on one line, and the corresponding lyrics on the next.&#10;Example:&#10;G         C        G&#10;Amazing grace how sweet the sound"></textarea>
                <button type="button" id="paste-ug-btn" class="paste-ug-button">Paste from Ultimate Guitar</button>

                <button type="submit" id="song-form-submit-btn">Save Song</button>
            </form>
        </div>
    </div>

    <div id="ocr-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content ocr-modal-content">
            <span id="close-ocr-modal-btn" class="close-button">&times;</span>
            <h2>Lyric OCR Tool</h2>
            <p class="ocr-subtitle">Convert handwritten lyrics from image/camera into editable text.</p>

            <div class="ocr-controls">
                <input type="file" id="ocr-image-input" accept="image/*">
                <button type="button" id="ocr-camera-btn">Use Camera</button>
                <button type="button" id="ocr-process-btn">Transcribe</button>
            </div>

            <div id="ocr-camera-view" style="display: none;">
                <video id="ocr-video-stream"></video>
                <div class="ocr-camera-actions">
                    <button type="button" id="ocr-capture-btn">Capture Photo</button>
                    <button type="button" id="ocr-close-camera-btn" class="ocr-secondary">Close Camera</button>
                </div>
                <canvas id="ocr-capture-canvas" style="display: none;"></canvas>
            </div>

            <p class="ocr-status" id="ocr-status-text">Ready to process.</p>

            <div id="ocr-preview-container" style="display: none;">
                <div class="ocr-preview-head">
                    <h3>Document Preview</h3>
                    <button type="button" id="ocr-close-preview-btn" class="ocr-secondary">Close Preview</button>
                </div>
                <canvas id="ocr-preview-canvas"></canvas>
            </div>

            <textarea id="ocr-output-area" rows="10" placeholder="Transcribed lyrics appear here..."></textarea>

            <div class="ocr-action-bar">
                <button type="button" id="ocr-auto-correct-btn">Auto-Correct</button>
                <button type="button" id="ocr-copy-btn" class="ocr-secondary">Copy Text</button>
                <button type="button" id="ocr-download-btn" class="ocr-success">Download .txt</button>
                <button type="button" id="ocr-use-in-song-btn" class="ocr-primary">Use in Song Form</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
