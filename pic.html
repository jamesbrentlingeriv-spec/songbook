<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricScribe | Handwriting OCR Tool</title>
    <script src="https://apis.google.com/js/client.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
            --status-text: #64748b;
        }

        body.dark-mode {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #475569;
            --status-text: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }

        header > div {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 0.95rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        input[type="file"] {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            flex-grow: 1;
            background-color: var(--card);
            color: var(--text);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #output-area {
            width: 100%;
            height: 300px;
            margin-top: 20px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: vertical;
            font-size: 1rem;
            line-height: 1.5;
            background-color: var(--card);
            color: var(--text);
        }

        .status {
            font-size: 0.9rem;
            color: var(--status-text);
            margin-top: 10px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            margin-bottom: 25px;
            padding-bottom: 10px;
        }

        #themeToggle {
            background-color: var(--border);
            color: var(--text);
            padding: 8px 12px;
            font-size: 1.2rem;
        }

        #themeToggle:hover {
            opacity: 0.8;
        }

        .action-bar {
            margin-top: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>LyricScribe OCR</h1>
            <p>Convert handwritten song lyrics into digital text documents.</p>
        </div>
        <button id="themeToggle">🌙</button>
    </header>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <button id="cameraBtn">📷 Use Camera</button>
        <button id="processBtn">Transcribe</button>
    </div>

    <div id="cameraView" style="display: none; margin-bottom: 20px;">
        <video id="videoStream" style="width: 100%; max-height: 400px; border-radius: 8px; background: #000;"></video>
        <div style="margin-top: 10px; display: flex; gap: 10px;">
            <button id="captureBtn" style="flex: 1;">Capture Photo</button>
            <button id="closeCameraBtn" style="flex: 1; background-color: #64748b;">Close Camera</button>
        </div>
        <canvas id="captureCanvas" style="display: none;"></canvas>
    </div>

    <div class="status" id="statusText">Ready to process. Make sure backend is running on port 3000.</div>

    <div id="previewContainer" style="margin-bottom: 20px; display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0; font-size: 1rem;">Document Preview</h3>
            <button id="closePreviewBtn" style="background-color: #64748b; padding: 6px 12px; font-size: 0.9rem;">Close Preview</button>
        </div>
        <canvas id="previewCanvas" style="display: block; width: 100%; height: auto; max-height: 400px; border: 2px solid var(--border); border-radius: 8px; background: #000; object-fit: contain;"></canvas>
        <p style="font-size: 0.85rem; color: var(--status-text); margin: 8px 0 0 0;">This is what the OCR engine will process</p>
    </div>

    <textarea id="output-area" placeholder="Transcribed lyrics will appear here..."></textarea>

    <div class="action-bar">
        <button id="autoCorrectBtn" style="background-color: #f59e0b;">✓ Auto-Correct</button>
        <button id="copyBtn" style="background-color: #64748b;">Copy Text</button>
        <button id="downloadBtn" style="background-color: #059669;">Download .txt</button>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const processBtn = document.getElementById('processBtn');
    const outputArea = document.getElementById('output-area');
    const statusText = document.getElementById('statusText');
    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const autoCorrectBtn = document.getElementById('autoCorrectBtn');
    const cameraBtn = document.getElementById('cameraBtn');
    const cameraView = document.getElementById('cameraView');
    const videoStream = document.getElementById('videoStream');
    const captureBtn = document.getElementById('captureBtn');
    const closeCameraBtn = document.getElementById('closeCameraBtn');
    const captureCanvas = document.getElementById('captureCanvas');
    const themeToggle = document.getElementById('themeToggle');
    const previewContainer = document.getElementById('previewContainer');
    const previewCanvas = document.getElementById('previewCanvas');
    const closePreviewBtn = document.getElementById('closePreviewBtn');
    let currentStream = null;
    let visionAPIKey = 'AIzaSyBJIqWPJSHRrsVM1kncNvnaYj1UUZ4w0CI'; // Backend will use this
    
    // Close preview button
    closePreviewBtn.addEventListener('click', () => {
        previewContainer.style.display = 'none';
    });

    // Auto-correct functionality - OCR error corrections only
    const autoCorrectText = (text) => {
        if (!text) return text;
        
        let corrected = text;
        
        // Apply OCR-specific corrections only
        // These are the most reliable fixes for handwriting OCR errors
        const corrections = [
            { regex: /\|/g, replace: 'l' },           
            { regex: /\b0\b/g, replace: 'o' },        
            { regex: /\b1\b/g, replace: 'i' },        
            { regex: /\btne\b/gi, replace: 'the' },   
            { regex: /\bot\b/gi, replace: 'of' },     
            { regex: /\bwha\b/gi, replace: 'what' },  
            { regex: /\bii\b/gi, replace: 'u' },      
            { regex: /\brn\b/gi, replace: 'm' },      
            { regex: /\bvv\b/gi, replace: 'w' },      
            { regex: /\bcl\b/gi, replace: 'd' },      
            { regex: /\bis\b/gi, replace: 'as' },     
            { regex: /\bbein\b/gi, replace: 'being' },
            { regex: /\bl0\b/gi, replace: 'lo' }      
        ];
        
        corrections.forEach(({ regex, replace }) => {
            corrected = corrected.replace(regex, replace);
        });
        
        return corrected;
    };
    
    autoCorrectBtn.addEventListener('click', () => {
        if (outputArea.value) {
            const corrected = autoCorrectText(outputArea.value);
            outputArea.value = corrected;
            statusText.innerText = '✓ Text auto-corrected!';
            setTimeout(() => {
                statusText.innerText = 'Ready to process. Backend: http://localhost:3000';
            }, 2000);
        } else {
            statusText.innerText = 'No text to correct';
        }
    });
    
    // Theme toggle functionality
    const initTheme = () => {
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.innerText = '☀️';
        }
    };

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDarkMode = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        themeToggle.innerText = isDarkMode ? '☀️' : '🌙';
    });

    // Initialize theme on page load
    initTheme();
    
    // Load Tesseract for fallback
    Tesseract.createWorker().then(worker => {
        // Preload Tesseract in background
    }).catch(e => console.log('Tesseract preload:', e));

    // Camera functionality
    cameraBtn.addEventListener('click', async () => {
        try {
            const constraints = {
                video: { facingMode: 'environment' }, // Use back camera on mobile
                audio: false
            };
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            videoStream.srcObject = currentStream;
            cameraView.style.display = 'block';
            statusText.innerText = "Camera ready. Click 'Capture Photo' to take a picture.";
        } catch (error) {
            console.error(error);
            alert("Camera access denied. Please allow camera permissions.");
            statusText.innerText = "Error: Could not access camera.";
        }
    });

    captureBtn.addEventListener('click', async () => {
        captureCanvas.width = videoStream.videoWidth;
        captureCanvas.height = videoStream.videoHeight;
        const context = captureCanvas.getContext('2d');
        context.drawImage(videoStream, 0, 0);
        
        captureCanvas.toBlob((blob) => {
            const file = new File([blob], "camera-photo.jpg", { type: "image/jpeg" });
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            imageInput.files = dataTransfer.files;
            
            closeCameraBtn.click();
            statusText.innerText = "Photo captured. Click 'Transcribe' to process.";
        }, 'image/jpeg', 0.95);
    });

    closeCameraBtn.addEventListener('click', () => {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        cameraView.style.display = 'none';
        videoStream.srcObject = null;
        statusText.innerText = "Camera closed. Ready to process.";
    });

    // Image preprocessing with preview
    const preprocessImage = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    
                    // Just draw the original image without any processing
                    ctx.drawImage(img, 0, 0);
                    
                    // Display preview (original image)
                    previewCanvas.width = canvas.width;
                    previewCanvas.height = canvas.height;
                    const previewCtx = previewCanvas.getContext('2d');
                    previewCtx.drawImage(canvas, 0, 0);
                    previewContainer.style.display = 'block';
                    
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/png' }));
                    }, 'image/png');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    };


    // Google Vision API text recognition
    const recognizeWithVision = async (imageFile) => {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            // Remove the data:image/png;base64, prefix
            const base64Image = e.target.result.split(',')[1];
            
            const url = `https://vision.googleapis.com/v1/images:annotate?key=${visionAPIKey}`;
            
            const requestData = {
                requests: [{
                    image: { content: base64Image },
                    features: [{ type: "DOCUMENT_TEXT_DETECTION" }] // Better for handwriting
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();
                
                if (result.responses && result.responses[0].fullTextAnnotation) {
                    resolve({
                        text: result.responses[0].fullTextAnnotation.text,
                        confidence: 95
                    });
                } else {
                    reject(new Error('No text detected or API error. Check Cloud Console Billing.'));
                }
            } catch (error) {
                reject(error);
            }
        };
        reader.readAsDataURL(imageFile);
    });
};

    processBtn.addEventListener('click', async () => {
        const file = imageInput.files[0];
        if (!file) {
            alert("Please select an image file first.");
            return;
        }

        processBtn.disabled = true;
        statusText.innerText = "Enhancing image quality...";

        try {
            // Preprocess image
            const processedFile = await preprocessImage(file);
            
            let result;
            
            if (visionAPIKey) {
                // Use backend Vision API
                statusText.innerText = "Sending to backend for recognition...";
                result = await recognizeWithVision(processedFile);
            } else {
                // Fallback to Tesseract
                statusText.innerText = "Initializing OCR engine...";
                result = await Tesseract.recognize(
                    processedFile,
                    'eng',
                    { 
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                statusText.innerText = `Transcribing: ${Math.round(m.progress * 100)}%`;
                            }
                        }
                    }
                );
                result = {
                    text: result.data.text.trim(),
                    confidence: result.data.confidence
                };
            }

            const text = result.text;
            const confidence = result.confidence;
            
            // Auto-correct the text
            const correctedText = autoCorrectText(text);
            outputArea.value = correctedText;
            
            if (confidence < 50) {
                statusText.innerText = `Transcription complete & auto-corrected. ⚠️ Confidence: ${confidence.toFixed(0)}%`;
            } else if (confidence < 75) {
                statusText.innerText = `Transcription complete & auto-corrected. Confidence: ${confidence.toFixed(0)}%`;
            } else {
                statusText.innerText = `Transcription complete & auto-corrected. ✓ Confidence: ${confidence.toFixed(0)}%`;
            }
        } catch (error) {
            console.error('Error:', error);
            const errorMsg = error.message || 'Unknown error';
            if (visionAPIKey) {
                if (errorMsg.includes('not running')) {
                    statusText.innerText = `Error: ${errorMsg}`;
                } else {
                    statusText.innerText = `Error: ${errorMsg}`;
                }
            } else {
                statusText.innerText = "Error: Tesseract failed. Consider enabling Vision API backend.";
            }
        } finally {
            processBtn.disabled = false;
        }
    });

    downloadBtn.addEventListener('click', () => {
        const text = outputArea.value;
        if (!text) return;
        
        const blob = new Blob([text], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'transcribed_lyrics.txt';
        a.click();
        window.URL.revokeObjectURL(url);
    });

    copyBtn.addEventListener('click', () => {
        if (outputArea.value) {
            outputArea.select();
            document.execCommand('copy');
            statusText.innerText = "✓ Text copied to clipboard.";
            setTimeout(() => {
                const visionStatus = visionAPIKey ? '(Vision AI enabled)' : '(Basic OCR)';
                statusText.innerText = `Ready to process. ${visionStatus}`;
            }, 2000);
        }
    });
    
    // Update status to show current OCR mode
    const updateOCRStatus = () => {
        statusText.innerText = 'Ready to process. Backend: http://localhost:3000';
    };
    updateOCRStatus();
</script>

</body>
</html>
